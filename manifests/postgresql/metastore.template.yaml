# One can list the possible values with
#   helm show values bitnami/postgresql

global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/postgresql
  tag: ${BENCHMARK_POSTGRESQL_BITNAMI_VERSION}
  pullPolicy: IfNotPresent

auth:
  enablePostgresUser: true
  postgresPassword: "${BENCHMARK_POSTGRESQL_METASTORE_PASSWORD}"
  username: "${BENCHMARK_POSTGRESQL_METASTORE_USERNAME}"
  password: "${BENCHMARK_POSTGRESQL_METASTORE_PASSWORD}"
  database: "${BENCHMARK_POSTGRESQL_METASTORE_DATABASE}"

primary:
  resources:
    limits:
      cpu: ${BENCHMARK_POSTGRESQL_METASTORE_RESOURCES_CPU_LIMIT}
      memory: ${BENCHMARK_POSTGRESQL_METASTORE_RESOURCES_MEM_LIMIT}
    requests:
      cpu: ${BENCHMARK_POSTGRESQL_METASTORE_RESOURCES_CPU_REQUEST}
      memory: ${BENCHMARK_POSTGRESQL_METASTORE_RESOURCES_MEM_REQUEST}

  persistence:
    enabled: ${BENCHMARK_POSTGRESQL_METASTORE_PERSISTENCE_ENABLED}
    storageClass: ${BENCHMARK_POSTGRESQL_METASTORE_PERSISTENCE_STORAGE_CLASS}
    size: ${BENCHMARK_POSTGRESQL_METASTORE_PERSISTENCE_SIZE}

  podLabels:
    benchmark/system: kube-bench
    benchmark/mutual-exclusive-key: "${BENCHMARK_PODS_DISTRIBUTION_MUTUAL_EXCLUSIVE_KEY}"
    benchmark/pod-affinity: metastore

  nodeSelector: ${BENCHMARK_PODS_DISTRIBUTION_GEN_NODE_SELECTOR}

  affinity: ${BENCHMARK_PODS_DISTRIBUTION_GEN_AFFINITY_FRONTEND_META}
