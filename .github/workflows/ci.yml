name: CI

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: "1.19"
    - name: Install validation tools
      run: sudo apt-get update && sudo apt-get install -y jq shellcheck
    - name: Run template checks
      run: make check
    - name: Run shellcheck
      run: make shellcheck

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build console image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        push: false
        load: false
